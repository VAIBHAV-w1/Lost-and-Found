{% include 'tracker/navbar.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Tracker Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #e9eff5;
    }

    .center {
      text-align: center;
      padding-top: 30px;
      font-size: 32px;
      font-weight: bold;
      color: #222;
    }

    a {
      display: block;
      text-align: center;
      margin: 15px 0;
      text-decoration: none;
      color: #007bff;
      font-size: 18px;
      font-weight: 500;
    }

    .form-section {
      padding: 40px;
      background-color: #ffffff;
      max-width: 800px;
      margin: 30px auto;
      border-radius: 16px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    .form-section h3 {
      text-align: center;
      color: #444;
      font-size: 24px;
      margin-bottom: 30px;
    }

    input, select, button, textarea {
      padding: 15px;
      margin: 15px 0;
      width: 96%;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 18px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      background-color: #007bff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    .map-container {
      max-width: 1000px;
      margin: 0 auto 60px;
    }

    .map-container h3 {
      text-align: center;
      color: #444;
      font-size: 24px;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      .form-section, .map-container {
        padding: 20px;
        width: 95%;
      }

      input, select, button, textarea {
        font-size: 16px;
      }

      .center {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <h2 class="center">Lost and Found Mobile Tracker</h2>
  <a href="{% url 'home' %}">Back to Home</a>

  <div class="form-section">
    <h3>Report Mobile</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>
  </div>

  <div class="map-container">
    <h3>Mobile Location Map</h3>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const centerLatLng = [12.9173, 77.5770];
    const bounds = L.latLngBounds([12.9145, 77.5740], [12.9200, 77.5800]);

    const map = L.map('map', {
      center: centerLatLng,
      zoom: 16,
      maxBounds: bounds,
      maxBoundsViscosity: 1.0,
      minZoom: 15,
      maxZoom: 18
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    let marker;

    map.on('click', function (e) {
      const latlng = e.latlng;
      if (!bounds.contains(latlng)) return;

      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`)
        .then(res => res.json())
        .then(data => {
          const locationName = data.display_name;
          if (marker) {
            marker.setLatLng(latlng);
          } else {
            marker = L.marker(latlng).addTo(map);
          }
          marker.bindPopup(locationName).openPopup();

          const locationInput = document.querySelector('input[name="location"]');
          if (locationInput) {
            locationInput.value = locationName;
          }
        });
    });

    window.addEventListener('load', () => {
      const locationInput = document.querySelector('input[name="location"]');
      if (!locationInput) return;

      locationInput.addEventListener('change', function () {
        const query = this.value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
          .then(res => res.json())
          .then(data => {
            if (data.length > 0) {
              const firstResult = data[0];
              const latlng = [firstResult.lat, firstResult.lon];
              if (!bounds.contains(latlng)) return;

              map.setView(latlng, 16);
              if (marker) {
                marker.setLatLng(latlng);
              } else {
                marker = L.marker(latlng).addTo(map);
              }
              marker.bindPopup(firstResult.display_name).openPopup();
            }
          });
      });
    });
  </script>

</body>
</html>
