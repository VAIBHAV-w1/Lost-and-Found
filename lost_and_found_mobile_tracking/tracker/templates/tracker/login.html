{% include "tracker/navbar.html" %}
<div class="container">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Log In</button>
    </form>
    <p class="text-link">Don't have an account? <a href="{% url 'signup' %}">Create a new account</a></p>
</div>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f6fb;
        color: #333;
    }

    .container {
        max-width: 420px;
        margin: 70px auto;
        padding: 35px 30px;
        background: linear-gradient(to bottom right, #ffffff, #e6f0ff);
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    h2 {
        text-align: center;
        color: #2c3e50;
        font-size: 2em;
        margin-bottom: 25px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 20px;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        transition: border 0.2s ease;
    }

    input:focus {
        border-color: #007BFF;
        outline: none;
    }

    .btn {
        background-color: #007BFF;
        padding: 14px;
        color: white;
        border-radius: 8px;
        width: 100%;
        border: none;
        font-weight: bold;
        font-size: 16px;
        transition: background 0.3s ease, transform 0.2s ease;
        cursor: pointer;
    }

    .btn:hover {
        background-color: #0056b3;
        transform: scale(1.02);
    }

    .text-link {
        text-align: center;
        margin-top: 10px;
        font-size: 15px;
    }

    .text-link a {
        color: #007BFF;
        text-decoration: none;
        font-weight: 500;
    }

    .text-link a:hover {
        text-decoration: underline;
    }

    @media (max-width: 500px) {
        .container {
            margin: 40px 15px;
            padding: 25px 20px;
        }

        h2 {
            font-size: 1.6em;
        }

        .btn {
            font-size: 15px;
        }
    }
</style>
