{% extends 'tracker/base.html' %}

{% block title %}Success | Lost and Found{% endblock %}

{% block content %}
<div class="glass-card narrow-card text-center" style="padding-top: 50px; padding-bottom: 50px;">
    
    <div style="font-size: 4rem; color: var(--success-color); margin-bottom: 20px;">
        ✓
    </div>
    
    <h2 style="color: var(--text-main);">Thank you!</h2>
    <p>Your report has been submitted successfully and the system has been updated.</p>

    {% if report and report.photo %}
        <div style="margin: 30px auto;">
            <h4 style="margin-bottom: 15px; color: var(--text-muted);">Attached Image:</h4>
            <img src="{{ report.photo.url }}" alt="Item Photo" style="max-width: 100%; border-radius: 6px; border: 1px solid var(--border-color);">
        </div>
    {% endif %}

    <div style="margin-top: 40px;">
        <a class="btn-primary" href="{% url 'home' %}">Return to Home</a>
    </div>
</div>
{% endblock %}
